---
- project:
    templates:
      - stx-api-ref-jobs
      - publish-stx-docs
      - stx-release-notes-jobs
      - stx-bandit-jobs
    check:
      jobs:
        - metal-tox-linters
        - metal-tox-pep8
        - metal-tox-pylint
    gate:
      jobs:
        - metal-tox-linters
        - metal-tox-pep8
        - metal-tox-pylint
    post:
      jobs:
        - stx-metal-upload-git-mirror

- job:
    name: metal-tox-linters
    parent: tox
    description: Run linters for metal repo
    nodeset: debian-bullseye
    vars:
      tox_envlist: linters

- job:
    name: metal-tox-pep8
    parent: tox
    description: Run pep8 for metal repo
    nodeset: debian-bullseye
    vars:
      tox_envlist: pep8

- job:
    name: metal-tox-pylint
    parent: tox
    description: Run pylint for metal repo
    nodeset: debian-bullseye
    vars:
      tox_envlist: pylint

- job:
    name: flock-devstack-metal
    parent: flock-devstack-base-min
    required-projects:
      - openstack/barbican
      - openstack/python-barbicanclient
      - starlingx/fault
      - starlingx/integ
      - starlingx/nfv
      - starlingx/update
      - starlingx/utilities
    vars:
      tox_envlist: functional
      devstack_services:
        # StarlingX services
        fm-common: true
        # fm-api: true
        # mtce: true
        mtce-compute: true
        mtce-control: true
        mtce-storage: true
        inventory-api: true
        inventory-conductor: true
        inventory-agent: true
        inventory-client: true
        fsmon: true
        hbs: true
        hwmon: true
        mtcalarm: true
        mtclog: true
        pmon: true
        rmon: true
      devstack_plugins:
        barbican: https://opendev.org/openstack/barbican
        fault: https:://opendev.org/starlingx/fault
        integ: https://opendev.org/starlingx/integ
        metal: https:://opendev.org/starlingx/metal
        # nfv: https:://opendev.org/starlingx/nfv
        update: https:://opendev.org/starlingx/update

- job:
    name: stx-metal-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/metal to
      github.com/starlingx/metal
    vars:
      git_mirror_repository: starlingx/metal
    secrets:
      - name: git_mirror_credentials
        secret: stx-metal-github-secret3
        pass-to-parent: true

